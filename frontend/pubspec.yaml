name: hobby_track
description: "HobbyTrack - Track your hobbies"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo-2.png
    - assets/logo-3.png
    - assets/hobbytrack_transparent.png
